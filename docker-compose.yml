services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_local_only
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U atlas"], interval: 5s, retries: 10}
  redis:
    image: redis:7
    ports: ["6379:6379"]
  api:
    build: .
    # uvicorn stays --host 0.0.0.0 INSIDE the container: Docker's published-port
    # path DNATs the host interface to the container's bridge IP (not its
    # loopback), so binding uvicorn to 127.0.0.1 in-container makes the API
    # unreachable even from the host. The security-effective bind is the ports
    # host-interface prefix below (127.0.0.1) — the unauthenticated API is
    # reachable ONLY from the local host, never on all interfaces (ADR-0018,
    # independent-review finding: no API auth yet).
    command: uvicorn atlas.api.main:app --host 0.0.0.0 --port 8000
    environment:
      ATLAS_DATABASE_URL: postgresql+psycopg://atlas:atlas_local_only@db:5432/atlas
      ATLAS_REDIS_URL: redis://redis:6379/0
      ATLAS_TRADING_MODE: paper
    ports: ["127.0.0.1:8000:8000"]
    depends_on:
      db: {condition: service_healthy}
volumes:
  pgdata:
