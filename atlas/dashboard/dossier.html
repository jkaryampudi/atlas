<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas — Stock Dossier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070a12; --panel:#0e1424; --panel2:#0a0f1c; --line:rgba(150,170,210,0.12);
    --line2:rgba(150,170,210,0.22);
    --txt:#e7edf8; --dim:rgba(210,220,242,0.62); --faint:rgba(210,220,242,0.4);
    --green:#35d98a; --red:#ff5c5c; --gold:#e2b95b; --blue:#5aa7ff;
    --mono:'JetBrains Mono',monospace; --disp:'Space Grotesk',Inter,sans-serif; --sans:Inter,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:28px 28px 80px}
  a{color:var(--blue);text-decoration:none}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* top bar */
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}
  .top .back{font-family:var(--mono);font-size:12px;letter-spacing:0.08em;color:var(--dim)}
  .top .back:hover{color:var(--txt)}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;padding:8px 16px;border:1px solid var(--line2);color:var(--dim);background:none;cursor:pointer;border-radius:6px}
  .btn:hover{border-color:var(--blue);color:var(--blue)}
  .actions{display:flex;gap:10px}

  /* hero */
  .hero{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .tkr{font-family:var(--mono);font-weight:600;font-size:38px;letter-spacing:0.02em}
  .srcbadge{font-family:var(--mono);font-size:12px;letter-spacing:0.06em;color:var(--gold);border:1px solid rgba(226,185,91,0.45);border-radius:6px;padding:5px 12px}
  .herometa{color:var(--dim);font-size:13px;margin-bottom:24px}

  /* verdict band */
  .band{display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:22px}
  .verdict{text-align:center;padding-right:22px;border-right:1px solid var(--line)}
  .verdict .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:0.2em;color:var(--faint)}
  .verdict .val{font-family:var(--disp);font-weight:700;font-size:22px;margin-top:4px}
  .verdict .sub{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:2px}
  .checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .check .lab{font-size:11px;color:var(--dim);margin-bottom:3px}
  .check .st{font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:6px}
  .g{color:var(--green)} .r{color:var(--red)} .neu{color:var(--dim)}

  /* section cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px}
  .card.full{grid-column:1/-1}
  .ctitle{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:rgba(140,185,255,0.75);text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:baseline}
  .kv{display:grid;grid-template-columns:1fr auto;gap:8px 16px;font-size:13.5px}
  .kv .k{color:var(--dim)}
  .kv .v{font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right}

  .perf{display:flex;gap:26px;flex-wrap:wrap}
  .perf .h{text-align:center}
  .perf .hl{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--faint)}
  .perf .hv{font-family:var(--mono);font-size:18px;margin-top:4px}
  .imm{color:var(--faint);font-size:12px;font-style:italic}

  .memo .rec{font-family:var(--disp);font-weight:700;font-size:14px;padding:3px 12px;border:1.5px solid;border-radius:6px;display:inline-block}
  .memo .rec.BUY{color:var(--green);border-color:var(--green)}
  .memo .rec.WATCHLIST{color:var(--blue);border-color:var(--blue)}
  .memo .rec.REJECT{color:var(--red);border-color:var(--red)}
  .memo p{font-size:13.5px;line-height:1.7;color:rgba(220,230,248,0.85);margin:10px 0}
  .memo .diss{border-left:2px solid var(--red);padding-left:12px;color:rgba(255,150,150,0.9)}
  .fnote{color:var(--faint);font-size:12px;margin-top:14px}

  .loading{color:var(--dim);font-family:var(--mono);padding:60px 0;text-align:center}

  /* financials tables + granularity toggle */
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:6px;overflow:hidden;font-family:var(--mono);font-size:10px;letter-spacing:0.1em}
  .seg button{background:none;border:none;color:var(--dim);padding:6px 14px;cursor:pointer}
  .seg button.on{background:rgba(90,167,255,0.16);color:var(--blue)}
  .scroll{overflow-x:auto}
  .stlab{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:0.14em;margin:16px 0 6px}
  .stlab:first-child{margin-top:2px}
  .tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12.5px}
  .tbl th,.tbl td{padding:6px 14px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
  .tbl th:first-child,.tbl td:first-child{text-align:left;color:var(--dim);position:sticky;left:0;background:var(--panel)}
  .tbl thead th{color:var(--faint);font-weight:500;font-size:10px;letter-spacing:0.06em}
  .statements[data-gran="annual"] .q{display:none}
  .statements[data-gran="quarterly"] .a{display:none}
  .subnote{color:var(--faint);font-size:11.5px;font-style:italic;margin:6px 0}

  /* valuation fair-value band */
  .fvband{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:18px;align-items:end;margin-bottom:6px}
  .fvstat .l{font-size:9.5px;color:var(--faint);font-family:var(--mono);letter-spacing:0.12em}
  .fvstat .v{font-family:var(--mono);font-size:21px;margin-top:5px}
  .fvstat .v.small{font-size:15px}
  .fvverdict{font-family:var(--disp);font-weight:700;font-size:13px;padding:4px 12px;border:1.5px solid;border-radius:6px;display:inline-block;white-space:nowrap}
  .fvverdict.g{color:var(--green);border-color:var(--green)}
  .fvverdict.r{color:var(--red);border-color:var(--red)}
  .fvverdict.gd{color:var(--gold);border-color:rgba(226,185,91,0.5)}
  .gd{color:var(--gold)}

  /* fragility markers (pick autopsy) */
  .fraglevel{display:inline-flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:0.02em;padding:5px 14px;border:1.5px solid;border-radius:6px;margin-bottom:14px}
  .fraglevel.fragile{color:var(--red);border-color:var(--red)}
  .fraglevel.caution{color:var(--gold);border-color:rgba(226,185,91,0.5)}
  .fraglevel.clear{color:var(--green);border-color:var(--green)}
  .flaglist{display:flex;flex-direction:column;gap:11px}
  .flag{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:baseline}
  .sevdot{width:9px;height:9px;border-radius:50%;flex:none;margin-top:5px}
  .sevdot.alert{background:var(--red)} .sevdot.warn{background:var(--gold)} .sevdot.info{background:var(--dim)}
  .flag .fl{font-size:13.5px;line-height:1.5}
  .flag .fl b{font-family:var(--disp);font-weight:600}
  .flag .fl .d{color:var(--dim)}

  /* health score pillars */
  .hcomposite{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
  .hcomposite .big{font-family:var(--mono);font-size:34px;font-weight:600;line-height:1}
  .hpillars{display:flex;flex-direction:column;gap:11px}
  .hpillar{display:grid;grid-template-columns:132px 1fr 40px 60px;gap:12px;align-items:center}
  .hpillar .plab{font-size:12.5px;color:var(--dim)}
  .hbar{height:8px;border-radius:4px;background:rgba(150,170,210,0.14);overflow:hidden}
  .hbar span{display:block;height:100%;border-radius:4px}
  .hscore{font-family:var(--mono);font-size:12.5px;text-align:right;font-variant-numeric:tabular-nums}
  .hrating{font-family:var(--mono);font-size:11px;color:var(--gold);text-align:right;letter-spacing:1px}

  @media print{
    .tbl th:first-child,.tbl td:first-child{background:#fff}
    .statements[data-gran="quarterly"] .q{display:none} .statements .a{display:block!important}
    .seg{display:none}
    :root{--bg:#fff;--panel:#fff;--panel2:#fff;--txt:#111;--dim:#555;--faint:#888;--line:#ddd;--line2:#ccc}
    body{font-size:12px} .top .actions{display:none} .band,.card{break-inside:avoid}
    a{color:#111}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="/console#research">&larr; back to console</a>
    <div class="actions">
      <button class="btn" id="analyze">ANALYZE WITH DESK</button>
      <button class="btn" onclick="window.print()">PRINT / PDF</button>
    </div>
  </div>
  <div id="body"><div class="loading">loading dossier…</div></div>
</div>
<script>
"use strict";
const _params = new URLSearchParams(location.search);
const id = _params.get("id");
const symbol = _params.get("symbol");
const $ = s => document.getElementById(s);
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function pct(v){ return v==null?"—":(v*100).toFixed(1)+"%"; }
function num(v,d){ return v==null?"—":(typeof v==="number"?v.toFixed(d==null?2:d):esc(v)); }
function sign(v){ return v==null?"neu":(v>0?"g":v<0?"r":"neu"); }
function kv(pairs){ return `<div class="kv">${pairs.map(p=>`<div class="k">${p[0]}</div><div class="v ${p[2]||''}">${p[1]}</div>`).join("")}</div>`; }
function badgeClass(s){ if(!s) return "neu"; return s.indexOf("Bull")>=0?"g":s.indexOf("Bear")>=0?"r":"neu"; }
function checkMark(v){ return v===true?'<span class="g">✓ agree</span>':v===false?'<span class="r">✗ diverge</span>':'<span class="neu">— n/a</span>'; }
function fmtMoney(v){ if(v==null) return "—"; const a=Math.abs(v);
  if(a>=1e9) return (v/1e9).toFixed(2)+"B"; if(a>=1e6) return (v/1e6).toFixed(0)+"M";
  if(a>=1e3) return (v/1e3).toFixed(0)+"K"; return num(v); }
function setGran(g){ const s=$("stmts"); if(s) s.dataset.gran=g;
  document.querySelectorAll(".seg button").forEach(b=>b.classList.toggle("on", b.dataset.g===g)); }
function oneTable(rows){
  if(!rows||!rows.length) return '<div class="subnote">no periods on record</div>';
  const labels = Object.keys(rows[0].values);
  const head = '<th></th>'+rows.map(r=>`<th>${esc(r.period)}</th>`).join("");
  const body = labels.map(l=>`<tr><td>${esc(l)}</td>`+rows.map(r=>`<td>${fmtMoney(r.values[l])}</td>`).join("")+'</tr>').join("");
  return `<div class="scroll"><table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function earningsTable(hist){
  if(!hist||!hist.length) return '<div class="subnote">no completed-quarter reports on record for this name</div>';
  const head='<th>Fiscal quarter</th><th>Reported</th><th>EPS actual</th><th>EPS est.</th><th>Surprise</th>';
  const body=hist.map(h=>`<tr><td>${esc(h.fiscal_period_end)}</td><td>${esc(h.report_date)}</td><td>${num(h.eps_actual)}</td><td>${num(h.eps_estimate)}</td><td class="${sign(h.surprise_pct)}">${h.surprise_pct==null?"—":(h.surprise_pct>0?"+":"")+num(h.surprise_pct,1)+"%"}</td></tr>`).join("");
  return `<div class="scroll"><table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function estimatesTable(est){
  if(!est||!est.length) return '<div class="subnote">Atlas began recording point-in-time forward consensus recently (ADR-0011) — the archive is young and rows accrue daily; historical vendor consensus is not backfillable.</div>';
  const head='<th>Fiscal period</th><th>EPS est. (avg)</th><th># analysts</th><th>Revenue est.</th><th>EPS Δ 30d</th><th>Revisions 30d</th>';
  const body=est.map(e=>{
    const d30=(e.eps_trend_current!=null&&e.eps_trend_30d!=null)?e.eps_trend_current-e.eps_trend_30d:null;
    return `<tr><td>${esc(e.fiscal_period_end)}</td><td>${num(e.eps_estimate_avg)}</td><td>${e.eps_estimate_analysts==null?"—":e.eps_estimate_analysts.toFixed(0)}</td><td>${fmtMoney(e.revenue_estimate_avg)}</td><td class="${sign(d30)}">${d30==null?"—":(d30>0?"+":"")+num(d30,3)}</td><td><span class="g">${e.revisions_up_30d==null?0:e.revisions_up_30d.toFixed(0)}↑</span> <span class="r">${e.revisions_down_30d==null?0:e.revisions_down_30d.toFixed(0)}↓</span></td></tr>`;
  }).join("");
  return `<div class="scroll"><table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function buildFinancials(F){
  const st=F.statements||{}, en=F.earnings||{};
  const inc=st.income||{}, bal=st.balance||{}, cf=st.cash_flow||{};
  const snap = F.snapshot_as_of?`vendor snapshot ${esc(F.snapshot_as_of)}`:"no vendor snapshot";
  return `
    <div class="card full"><div class="ctitle">Financial Statements <span style="text-transform:none;letter-spacing:0;color:var(--faint)">${snap}${F.currency?" · "+esc(F.currency):""}</span></div>
      <div style="margin-bottom:4px"><span class="seg"><button data-g="annual" class="on" onclick="setGran('annual')">ANNUAL</button><button data-g="quarterly" onclick="setGran('quarterly')">QUARTERLY</button></span></div>
      <div class="statements" id="stmts" data-gran="annual">
        <div class="stlab">INCOME STATEMENT</div>
        <div class="a">${oneTable(inc.annual)}</div><div class="q">${oneTable(inc.quarterly)}</div>
        <div class="stlab">BALANCE SHEET</div>
        <div class="a">${oneTable(bal.annual)}</div><div class="q">${oneTable(bal.quarterly)}</div>
        <div class="stlab">CASH FLOW</div>
        <div class="a">${oneTable(cf.annual)}</div><div class="q">${oneTable(cf.quarterly)}</div>
      </div>
    </div>
    <div class="card full"><div class="ctitle">Earnings History · EPS Surprises</div>${earningsTable(en.history)}</div>
    <div class="card full"><div class="ctitle">Forward Consensus · Analyst Estimates</div>${estimatesTable(en.estimates)}</div>`;
}
function upClass(v){ return v==null?"neu":v>0?"g":v<0?"r":"neu"; }
function upTxt(v){ return v==null?"—":(v>0?"+":"")+(v*100).toFixed(1)+"%"; }
function dcfGrid(dcf){
  const g=dcf.sensitivity||[];
  if(!g.length) return '<div class="subnote">insufficient data for a DCF (needs positive free cash flow, share count, and WACC above terminal growth)</div>';
  const waccs=[...new Set(g.map(x=>x.wacc))].sort((a,b)=>a-b);
  const grs=[...new Set(g.map(x=>x.growth))].sort((a,b)=>a-b);
  const head='<th>growth ↓ / WACC →</th>'+waccs.map(w=>`<th>${(w*100).toFixed(1)}%</th>`).join("");
  const body=grs.map(gr=>`<tr><td>${(gr*100).toFixed(0)}%</td>`+waccs.map(w=>{
    const cell=g.find(x=>x.growth===gr&&x.wacc===w);
    return `<td>${cell&&cell.fair_value_per_share!=null?num(cell.fair_value_per_share,2):"—"}</td>`;}).join("")+'</tr>').join("");
  return `<div class="scroll"><table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function dcfVariants(dcf){
  const V=dcf.variants||{};
  if(!Object.keys(V).length) return '<div class="subnote">insufficient data for the DCF variant matrix</div>';
  const terms=[["Perpetuity growth","growth"],["EV/EBITDA exit","ebitda"],["EV/Revenue exit","revenue"]];
  const head='<th>Terminal method</th><th>5-year</th><th>10-year</th>';
  const body=terms.map(([lab,t])=>{
    const c5=V['5y_'+t]||{}, c10=V['10y_'+t]||{};
    return `<tr><td>${lab}</td><td>${num(c5.fair_value_per_share,2)}</td><td>${num(c10.fair_value_per_share,2)}</td></tr>`;}).join("");
  const em=dcf.exit_ev_ebitda!=null?" ("+num(dcf.exit_ev_ebitda,1)+")":"", er=dcf.exit_ev_revenue!=null?" ("+num(dcf.exit_ev_revenue,1)+")":"";
  return `<div class="scroll"><table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`
    +`<div class="subnote">Six DCF variants, fair value / share. The exit-multiple terminals hold today's EV/EBITDA${em} and EV/Revenue${er} constant — so a name trading at rich multiples looks richly valued by them too (circular). For that reason the fair-value range above uses the perpetuity-growth terminal (the 5-year cell), not these.</div>`;
}
function compsTable(comps){
  if(!comps.n_peers) return '<div class="subnote">no sector peers with comparable multiples available</div>';
  const m=comps.multiples||{}, rows=[["P/E","pe"],["EV/EBITDA","ev_ebitda"],["EV/EBIT","ev_ebit"],["EV/Revenue","ev_revenue"],["P/S","ps"],["P/B","pb"]];
  const head='<th>Multiple</th><th>Stock</th><th>Sector median</th><th>Percentile</th><th>Implied value</th>';
  const body=rows.map(([lab,k])=>{const c=m[k]||{};
    return `<tr><td>${lab}</td><td>${num(c.stock,1)}</td><td>${num(c.peer_median,1)}</td><td>${c.percentile==null?"—":(c.percentile*100).toFixed(0)+"%"}</td><td>${num(c.implied_value,2)}</td></tr>`;}).join("");
  return `<div class="scroll"><table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`
    +`<div class="subnote">Percentile = how rich vs the ${esc(comps.sector||"sector")} peers (${comps.n_peers} names): higher = more expensive than more of the sector.</div>`;
}
function buildAutopsy(A){
  const flags=A.flags||[], lvl=A.level||"clear", n=(A.n_alerts||0)+(A.n_warns||0);
  const lvlTxt = lvl==="fragile" ? `FRAGILE · ${A.n_alerts} alert${A.n_alerts===1?"":"s"}`
    : lvl==="caution" ? `CAUTION · ${n} marker${n===1?"":"s"}`
    : "NO FRAGILITY MARKERS";
  const rows = flags.map(f=>`<div class="flag"><span class="sevdot ${esc(f.severity)}"></span><span class="fl"><b>${esc(f.label)}</b> <span class="d">— ${esc(f.detail)}</span></span></div>`).join("");
  return `<div class="card full">
    <div class="ctitle">Fragility Markers <span style="text-transform:none;letter-spacing:0;color:var(--faint)">Atlas's pick autopsy — descriptive, not a filter</span></div>
    <div class="fraglevel ${esc(lvl)}">${lvlTxt}</div>
    ${flags.length?`<div class="flaglist">${rows}</div><div class="subnote">${esc(A.note||"")}</div>`
      :`<div class="subnote">None of Atlas's descriptive risk checks tripped for this name.</div>`}
  </div>`;
}
function healthColor(sc){ return sc==null?"var(--dim)":sc>=60?"var(--green)":sc>=40?"var(--gold)":"var(--red)"; }
function stars(r){ return r==null?"—":"★".repeat(r)+"☆".repeat(5-r); }
function buildHealth(H){
  const c=H.composite||{}, P=H.pillars||{};
  const order=["relative_value","profitability","growth","cash_flow","momentum"];
  const rows=order.map(k=>{const p=P[k]||{}, sc=p.score;
    return `<div class="hpillar"><span class="plab">${esc(p.label||k)}</span>`
      +`<span class="hbar"><span style="width:${sc==null?0:sc}%;background:${healthColor(sc)}"></span></span>`
      +`<span class="hscore">${sc==null?"—":sc.toFixed(0)}</span>`
      +`<span class="hrating">${stars(p.rating)}</span></div>`;}).join("");
  return `<div class="card full"><div class="ctitle">Atlas Health Score <span style="text-transform:none;letter-spacing:0;color:var(--faint)">our factor percentiles vs ${H.universe_n||0} S&amp;P 500 names · not a vendor score</span></div>
    <div class="hcomposite"><span class="big" style="color:${healthColor(c.score)}">${c.score==null?"—":c.score.toFixed(0)}</span><span style="color:var(--faint);font-size:13px">/ 100 composite</span><span class="hrating" style="font-size:16px;margin-left:auto">${stars(c.rating)}</span></div>
    <div class="hpillars">${rows}</div>
    <div class="subnote">${esc(H.note||"")} Each pillar is the average percentile of its factors vs the universe; higher = healthier.</div></div>`;
}
function buildValuation(V){
  const sm=V.summary||{}, coc=V.cost_of_capital||{}, a=coc.assumptions||{}, epv=V.epv||{}, dcf=V.dcf||{}, comps=V.comparables||{}, dp=V.dupont||{};
  const vc = sm.verdict==="below our model range"?"g":sm.verdict==="above our model range"?"r":"gd";
  const band = `<div class="fvband">
      <div class="fvstat"><div class="l">MODEL LOW</div><div class="v">${num(sm.fair_value_low,2)}</div></div>
      <div class="fvstat"><div class="l">CENTRAL</div><div class="v gd">${num(sm.fair_value_central,2)}</div></div>
      <div class="fvstat"><div class="l">MODEL HIGH</div><div class="v">${num(sm.fair_value_high,2)}</div></div>
      <div class="fvstat"><div class="l">CURRENT PRICE</div><div class="v">${num(sm.price,2)}</div></div>
      <div class="fvstat"><div class="l">UPSIDE TO CENTRAL</div><div class="v small ${upClass(sm.upside_to_central_pct)}">${upTxt(sm.upside_to_central_pct)}</div></div>
      <div class="fvstat"><div class="l">ATLAS VERDICT</div><div style="margin-top:5px"><span class="fvverdict ${vc}">${esc(sm.verdict||"insufficient data")}</span></div></div>
    </div>`;
  return `
    <div class="card full"><div class="ctitle">Atlas Valuation Models <span style="text-transform:none;letter-spacing:0;color:var(--faint)">our own mechanical fair value${V.snapshot_as_of?" · snapshot "+esc(V.snapshot_as_of):""}</span></div>
      ${band}
      <div class="subnote">${esc(sm.note||"")} Methods contributing: ${(sm.methods||[]).map(esc).join(" · ")||"—"}.</div>
    </div>
    <div class="grid">
      <div class="card"><div class="ctitle">EPV — no-growth floor</div>${kv([
        ["Fair value / share","<b>"+num(epv.fair_value_per_share,2)+"</b>"],
        ["Upside vs price",upTxt(epv.upside_pct),upClass(epv.upside_pct)],
        ["Normalized op. margin",pct(epv.normalized_operating_margin)],
        ["Normalized EBIT",fmtMoney(epv.normalized_ebit)],
        ["NOPAT",fmtMoney(epv.nopat)],
      ])}<div class="subnote">${esc(epv.note||"")}</div></div>

      <div class="card"><div class="ctitle">DCF — central estimate</div>${kv([
        ["Fair value / share","<b>"+num(dcf.fair_value_per_share,2)+"</b>"],
        ["Upside vs price",upTxt(dcf.upside_pct),upClass(dcf.upside_pct)],
        ["Base FCFF (unlevered)",fmtMoney(dcf.base_fcf)],
        ["Vendor FCF (levered)",fmtMoney(dcf.levered_fcf)],
        ["Normalized FCF (5y median)",fmtMoney(dcf.normalized_fcf)],
        ["Hist. revenue CAGR",pct(dcf.historical_revenue_cagr)],
        ["Central growth (capped)",pct(dcf.central_growth)],
        ["Forecast horizon",dcf.forecast_years==null?"—":dcf.forecast_years+"y + terminal"],
        ["Terminal growth",pct(dcf.terminal_growth)],
        ["WACC",pct(dcf.wacc)],
      ])}</div>

      <div class="card"><div class="ctitle">Cost of Capital (WACC)</div>${kv([
        ["Beta",num(coc.beta)],
        ["Cost of equity (CAPM)",pct(coc.cost_of_equity)],
        ["Cost of debt (after tax)",pct(coc.cost_of_debt_aftertax)],
        ["WACC","<b>"+pct(coc.wacc)+"</b>"],
        ["— risk-free (assumed)",pct(a.risk_free_rate)],
        ["— equity risk prem. (assumed)",pct(a.equity_risk_premium)],
        ["— tax rate (normalized)",pct(a.tax_rate)],
      ])}</div>

      <div class="card"><div class="ctitle">DuPont ROE</div>${kv([
        ["Net margin",pct(dp.net_margin)],
        ["× Asset turnover",num(dp.asset_turnover,2)],
        ["× Equity multiplier",num(dp.equity_multiplier,2)],
        ["= Return on equity",pct(dp.roe),upClass(dp.roe)],
      ])}</div>
    </div>
    <div class="card full"><div class="ctitle">DCF — 6 variants (horizon × terminal method)</div>${dcfVariants(dcf)}</div>
    <div class="card full"><div class="ctitle">DCF sensitivity — fair value / share across growth × WACC</div>${dcfGrid(dcf)}</div>
    <div class="card full"><div class="ctitle">Comparables — 6 sector-peer multiples</div>${compsTable(comps)}</div>`;
}

async function load(){
  let url;
  if(id) url = `/v1/research/source-picks/${encodeURIComponent(id)}/dossier`;
  else if(symbol) url = `/v1/research/tickers/${encodeURIComponent(symbol)}/dossier`;
  else { $("body").innerHTML = '<div class="loading">no ticker in the URL</div>'; return; }
  let r;
  try{ r = await fetch(url); }
  catch(e){ $("body").innerHTML = '<div class="loading">could not reach the API</div>'; return; }
  if(!r.ok){ $("body").innerHTML = `<div class="loading">dossier not found (${r.status})</div>`; return; }
  const d = await r.json();
  render(d);
}

function render(d){
  const f=d.features||{}, x=d.excess||{}, c=d.cross_check||{}, m=d.memo, sig=d.atlas_signals||[];
  const M=d.models||{}, t=M.technical||{}, mo=M.momentum||{}, v=M.valuation||{}, q=M.quality||{}, rk=M.risk||{};
  const F=d.financials||null, ks=(F&&F.key_stats)||{}, finHTML=F?buildFinancials(F):"";
  const V=d.valuation||null, valHTML=V?buildValuation(V):"";
  const H=d.health||null, healthHTML=H?buildHealth(H):"";
  const A=d.autopsy||null, autopsyHTML=(A&&(A.flags||[]).length)?buildAutopsy(A):"";
  document.title = `${d.ticker} — Atlas dossier`;
  const perf = [5,10,20,60].map(h=>`<div class="h"><div class="hl">vs SPY @${h}s</div><div class="hv ${sign(x[h])}">${x[h]==null?'<span class="imm">immature</span>':(x[h]>0?"+":"")+pct(x[h])}</div></div>`).join("");

  $("body").innerHTML = `
    <div class="hero">
      <div class="tkr">${esc(d.ticker)}</div>
      ${d.source
        ? `<div class="srcbadge">${esc(d.source)} · ${esc(d.source_recommendation)}</div>`
        : `<div class="srcbadge" style="color:var(--blue);border-color:rgba(90,167,255,0.45)">ATLAS RESEARCH</div>`}
    </div>
    <div class="herometa">${d.source
      ? `Recommended ${esc(d.recommendation_date)} · features point-in-time as of ${esc(d.as_of_session)} · measured, never traded — no path to capital`
      : `Atlas research dossier · figures live as of today · measured, never a path to capital`}</div>

    <div class="band">
      <div class="verdict">
        <div class="lab">TECHNICAL TREND</div>
        <div class="val ${badgeClass(t.summary)}">${esc(t.summary||"—")}</div>
        <div class="sub">${t.bullish_signals==null?"":t.bullish_signals+"/"+t.total_signals+" bullish"}</div>
      </div>
      <div class="checks">
        <div class="check"><div class="lab">Source vs Atlas committee</div><div class="st">${checkMark(c.atlas_agrees)}</div></div>
        <div class="check"><div class="lab">Momentum supports the call</div><div class="st">${c.momentum_supports===true?'<span class="g">✓ yes</span>':c.momentum_supports===false?'<span class="r">✗ no</span>':'<span class="neu">—</span>'}</div></div>
        <div class="check"><div class="lab">Atlas signal engine flags it</div><div class="st">${(c.atlas_signal_flags||[]).length?'<span class="g">✓ '+esc(c.atlas_signal_flags.join(", "))+'</span>':'<span class="neu">— none</span>'}</div></div>
        <div class="check"><div class="lab">Outcome so far (vs SPY @20s)</div><div class="st">${c.outcome_so_far==="outperforming"?'<span class="g">outperforming</span>':c.outcome_so_far==="underperforming"?'<span class="r">underperforming</span>':'<span class="neu">'+esc(c.outcome_so_far||"—")+'</span>'}</div></div>
      </div>
    </div>

    ${autopsyHTML}

    ${d.source
      ? `<div class="card full"><div class="ctitle">Performance vs SPY</div><div class="perf">${perf}</div></div>`
      : ""}

    <div class="grid">
      <div class="card"><div class="ctitle">Key Indicators</div>${kv([
        ["Beta (5Y, vendor)",num(ks.beta_5y)],
        ["Book value / share",num(ks.book_value_per_share)],
        ["Revenue (ttm)",fmtMoney(ks.revenue_ttm)],
        ["Free cash flow",fmtMoney(ks.fcf)],
        ["FCF yield (derived)",ks.fcf_yield_pct==null?"—":num(ks.fcf_yield_pct,2)+"%"],
        ["Shares outstanding",fmtMoney(ks.shares_outstanding)],
        ["EPS est. (curr yr)",num(ks.eps_estimate_current_year)],
        ["EPS est. (next yr)",num(ks.eps_estimate_next_year)],
        ["Wall St. target",num(ks.wall_street_target)],
      ])}</div>

      <div class="card"><div class="ctitle">Technical</div>${kv([
        ["Price","<b>"+num(M.price)+"</b>"],
        ["SMA 20 / 50",num(t.sma_20)+" / "+num(t.sma_50)],
        ["SMA 100 / 200",num(t.sma_100)+" / "+num(t.sma_200)],
        ["EMA 20 / 50",num(t.ema_20)+" / "+num(t.ema_50)],
        ["RSI (14)",num(t.rsi_14,1)],
        ["MACD histogram",num(t.macd_hist,3),sign(t.macd_hist)],
        ["Stochastic %K",t.stochastic_k==null?"—":t.stochastic_k.toFixed(0)],
        ["ATR %",pct(t.atr_pct)],
        ["52-week high / low",num(t.high_52w)+" / "+num(t.low_52w)],
        ["Position in 52-week range",t.pct_of_52w_range==null?"—":t.pct_of_52w_range.toFixed(0)+"%"],
      ])}</div>

      <div class="card"><div class="ctitle">Momentum · Relative Strength</div>${kv([
        ["12-1 momentum",pct(mo.mom_12_1),sign(mo.mom_12_1)],
        ["Return 20d",pct(mo.ret_20d),sign(mo.ret_20d)],
        ["Return 63d",pct(mo.ret_63d),sign(mo.ret_63d)],
        ["Return 6m",pct(mo.ret_126d),sign(mo.ret_126d)],
        ["Return 1y",pct(mo.ret_252d),sign(mo.ret_252d)],
        ["Relative strength vs SPY (1y)",pct(mo.rs_vs_spy_252d),sign(mo.rs_vs_spy_252d)],
      ])}</div>

      <div class="card"><div class="ctitle">Valuation</div>${kv([
        ["Trailing P/E",num(v.trailing_pe)],["Forward P/E",num(v.forward_pe)],
        ["P/S ttm",num(v.ps_ttm)],["EV / EBITDA",num(v.ev_ebitda)],
        ["P/B",num(v.price_book)],["PEG",num(v.peg)],
        ["Dividend yield",pct(v.dividend_yield)],
        ["Analyst target",num(v.analyst_target)],
        ["Implied upside",pct(v.upside_pct),sign(v.upside_pct)],
        ["Market cap",v.market_cap==null?"—":(v.market_cap/1e9).toFixed(1)+"B"],
      ])}</div>

      <div class="card"><div class="ctitle">Quality</div>${kv([
        ["ROE",pct(q.roe),sign(q.roe)],
        ["Gross margin",pct(q.gross_margin)],
        ["Operating margin",pct(q.operating_margin),sign(q.operating_margin)],
        ["Profit margin",pct(q.profit_margin),sign(q.profit_margin)],
        ["Revenue growth yoy",pct(q.revenue_growth_yoy),sign(q.revenue_growth_yoy)],
        ["EPS ttm",num(q.eps_ttm)],
      ])}</div>

      <div class="card"><div class="ctitle">Risk</div>${kv([
        ["Volatility (20d, annualized)",pct(rk.vol_20d_ann)],
        ["Beta vs SPY",num(rk.beta_vs_spy)],
        ["ATR %",pct(rk.atr_pct)],
      ])}</div>

      <div class="card"><div class="ctitle">Context</div>${kv([
        ["Sector",esc(f.sector_gics||"—")],
        ["Market regime (SPY)",esc(f.spy_regime||"—")],
        ["Sessions to next earnings",f.sessions_to_next_earnings==null?"—":f.sessions_to_next_earnings],
      ])}${sig.length?`<div style="margin-top:12px;font-size:12px;color:var(--dim)">Atlas signal engine: ${sig.map(s=>esc(s.family)+" (rank "+(s.rank==null?"—":s.rank)+")").join(" · ")}</div>`:""}</div>
    </div>

    ${finHTML}

    ${healthHTML}

    ${valHTML}

    <div class="card full memo" style="margin-top:16px">
      <div class="ctitle">Atlas Committee View</div>
      ${m?`<div><span class="rec ${esc(m.recommendation)}">${esc(m.recommendation)}</span> <span class="mono" style="color:var(--dim);font-size:12px;margin-left:8px">conviction ${esc(m.conviction)}</span></div>
        <p>${esc(m.thesis)}</p>
        <p class="diss"><b>Dissent — the case against:</b> ${esc(m.dissent)}</p>
        ${(m.kill_criteria||[]).length?`<p style="color:var(--dim);font-size:12px">Kill criteria: ${m.kill_criteria.map(esc).join(" · ")}</p>`:""}`
      :`<p class="imm">The committee hasn't analyzed this name yet. Press <b>ANALYZE WITH DESK</b> above to run the six-seat committee (~2 min, ~$0.23), then refresh this page.</p>`}
    </div>
    <div class="fnote">Technical, momentum and risk statistics are computed deterministically and point-in-time from ${esc(d.ticker)}'s own split-adjusted bars as of the pick's as-of session. Statements, earnings surprises and forward consensus are reported verbatim from Atlas's stored vendor archive as of the latest snapshot shown — a present-tense reference, distinct from the frozen pick fingerprint above. No forecasts are fabricated. Atlas AI Capital · paper mode · not investment advice.</div>`;

  $("analyze").onclick = async ()=>{
    const b = $("analyze"); b.disabled = true; b.textContent = "DESK RUNNING…";
    try{
      const rr = await fetch("/v1/research/analyze", {method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({symbol:d.ticker,source:d.source})});
      const j = await rr.json();
      b.textContent = (rr.ok && j.started) ? "DESK RUNNING… (~2 min, then refresh)" : "DESK BUSY — one at a time";
    }catch(e){ b.disabled=false; b.textContent="ANALYZE — RETRY"; }
  };
}
load();
</script>
