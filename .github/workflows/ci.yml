name: ci
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # job-level so pytest sees it too: integration tests must RUN in CI, not
      # silently skip (conftest auto-creates the isolated atlas_test database)
      ATLAS_DATABASE_URL: "postgresql+psycopg://atlas:atlas@localhost:5432/atlas"
    services:
      postgres:
        image: postgres:16
        env: {POSTGRES_DB: atlas, POSTGRES_USER: atlas, POSTGRES_PASSWORD: atlas}
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U atlas" --health-interval 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e ".[dev]"
      - run: ruff check atlas tests
      - run: mypy
      - run: pytest
      - name: migration check
        # raw-SQL migrations (no ORM metadata), so `alembic check` cannot apply;
        # the meaningful assertion is: apply cleanly from zero and land on head
        run: |
          alembic upgrade head
          alembic current | grep -q "(head)"
